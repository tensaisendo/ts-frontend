<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Annuaire</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <h1>Annuaire</h1>

    <input id="search" placeholder="Recherche..." />

    <div class="filters city" id="cityFilters"></div>

    <div class="filters price">
        <button onclick="setPrice(999)" class="active">Tous</button>
        <button onclick="setPrice(150)">≤150€</button>
        <button onclick="setPrice(200)">≤200€</button>
        <button onclick="setPrice(300)">≤300€</button>
    </div>

    <div class="filters sort">
        <button onclick="setSort('asc')">Prix ↑</button>
        <button onclick="setSort('desc')">Prix ↓</button>
    </div>

    <div id="results"></div>

    <script src="app.js"></script>

</body>
</html>
